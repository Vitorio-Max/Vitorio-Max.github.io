<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VityUno</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../Css/navbar.css">


</head>

<body>
    <header>
        <a href="../index.html" class="navbar-brand">
            <img src="../Imagenes/viityuno.webp" alt="Logo VityUno" class="navbar-logo">
        </a>
        <button id="abrir" class="abrir-menu"><i class="bi bi-list"></i></button>

        <nav class="navbar" id="nav">


            <div class="navbar-container">
                <button id="cerrar" class="cerrar-menu"><i class="bi bi-x"></i></button>
                <ul class="nav-links">
                    <li><a href="../index.html" class="nav-link">Inicio</a></li>
                    <li><a href="calcuheader.html" class="nav-link">Calculadora</a></li>
                    <li><a href="contador.html" class="nav-link">Contador</a></li>
                    <li><a href="cuentaAtras.html" class="nav-link">Cuenta atrás</a></li>
                    <li><a href="listadelacompra.html" class="nav-link">Lista de la compra</a></li>
                    <li><a href="cuentos.html" class="nav-link">Cuentos</a></li>
                    <li><a href="juegos.html" class="nav-link">Juegos</a></li>
                    <button id="authButton" class="btnLogin-popup">Inicia sesión</button>
                    <div id="welcomeMessage" style="display: none; color: white; margin-right: 15px;"></div>
                </ul>
            </div>
        </nav>
    </header>

    <div class="wrapper">
        <span class="icon-close"><ion-icon name="close-outline"></ion-icon></span>
        <div class="form-box login">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox">Remember me</input>
                    </label>
                    <a href="#">Forgot Password</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="login-register">
                    <p>Don't have an account?<a href="#" class="register-link">Register</a></p>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <h2>Registration</h2>
            <form id="registerForm">
                <div class="input-box">
                    <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                    <input type="text" required>
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox">I agree to the terms & conditions</input>
                    </label>
                </div>
                <button type="submit" class="btn">Register</button>
                <div class="login-register">
                    <p>Already have an account?<a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>


    <main class="container-servicio" style="padding: 20px; text-align: center; margin-top: 100px;">
    
    <div id="controles-servicio">
        <button id="btn-iniciar" class="btn" style="background-color: #28a745; margin-bottom: 10px;">
            <i class="bi bi-play-fill"></i> Iniciar Servicio
        </button>
        
        <button id="btn-finalizar" class="btn" style="background-color: #dc3545; display: none;">
            <i class="bi bi-stop-fill"></i> Finalizar Servicio
        </button>
    </div>

    <div id="form-finalizar" style="display: none; background: #fff; padding: 20px; border-radius: 10px; margin-top: 20px; color: #000; max-width: 300px; margin-left: auto; margin-right: auto;">
        <h3>Detalles del Pago</h3>
        <input type="number" id="importe" placeholder="Importe €" style="width: 100%; margin-bottom: 10px; padding: 8px;">
        
        <select id="metodo-pago" style="width: 100%; margin-bottom: 15px; padding: 8px;">
            <option value="efectivo">Efectivo</option>
            <option value="tarjeta">Tarjeta</option>
            <option value="aplicacion">Aplicación</option>
        </select>
        
        <button id="btn-confirmar-guardar" class="btn" style="width: 100%;">Guardar en Supabase</button>
    </div>
</main>


    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="../JavaScript/menuH.js"></script>
    <script type="module" src="../JavaScript/supabase.js"></script>
    <script type="module" src="../JavaScript/taxIA.js"></script>

    <script type="module" src="../JavaScript/login.js"></script>
    <script type="module" src="../JavaScript/auth-check.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</body>

</html>
