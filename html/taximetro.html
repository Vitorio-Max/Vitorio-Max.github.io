<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VityUno</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../Css/navbar.css">
    <link rel="stylesheet" href="../Css/taximetro.css">
</head>
<body>
    <header>
        
        <a href="../index.html" class="navbar-brand">
            <img src="../Imagenes/viityuno.webp" alt="Logo VityUno" class="navbar-logo">
        </a>
        
        <button id="abrir" class="abrir-menu"><i class="bi bi-list"></i></button>
        <nav class="navbar" id="nav">
            
            <div class="navbar-container">
                <button class="cerrar-menu" id="cerrar" ><i class="bi bi-x"></i></button>
                <ul class="nav-links">
                    <li><a href="../index.html" class="nav-link">Inicio</a></li>
                    <li><a href="calcuheader.html" class="nav-link">Calculadora</a></li>
                    <li><a href="contador.html" class="nav-link">Contador</a></li>
                    <li><a href="cuentaAtras.html" class="nav-link">Cuenta atrás</a></li>
                    <li><a href="listadelacompra.html" class="nav-link">Lista de la compra</a></li>
                    <li><a href="cuentos.html" class="nav-link">Cuentos</a></li>
                    <li><a href="juegos.html" class="nav-link">Juegos</a></li>
                    <button class="btnLogin-popup">Inicia sesión</button>
                </ul>
            </div>
        </nav>
    
</header> 

<div class="wrapper">
        <span class="icon-close"><ion-icon name="close-outline"></ion-icon></span>
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox">Remember me</input>
                    </label>
                    <a href="#">Forgot Password</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="login-register">
                    <p>Don't have an account?<a href="#" class="register-link">Register</a></p>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <h2>Registration</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                    <input type="text" required>
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox">I agree to the terms & conditions</input>
                    </label>
                </div>
                <button type="submit" class="btn">Register</button>
                <div class="login-register">
                    <p>Already have an account?<a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <div class="taximetro-container">
        <div class="pantalla">
            
            <div class="fila-superior">
                <div class="indicadores-estado">
                    <span class="texto-fijo encendido">Libre</span>
                    <span class="texto-fijo">Ocupado</span>
                    <span class="texto-fijo">A Pagar</span>
                    <span class="texto-fijo">Medición</span>
                </div>
                
                <div class="digitos tarifa-display">L</div>
                
                <div class="etiqueta-central">
                    <span class="texto-fijo encendido" style="font-size: 13px;"></span>
                </div>
                
                <div class="digitos precio-display"></div>
            </div>

            <div class="fila-inferior">
                <div class="digitos suplemento-display"></div>
                
                <div style="margin-left: 10px; margin-bottom: 5px;">
                    <span class="texto-fijo">Supl. €</span>
                </div>

                <div style="margin-right: 40px; margin-bottom: 5px;">
                    <span class="texto-fijo">A Pagar €</span>
                </div>

                <div class="marca-taxitronic">TAXíMETRO</div>
            </div>

            <div class="linea-verde"></div>

            <div class="simbolos-leyenda">
                <span>O</span>
                <span>1</span>
                <span>2</span>
                <span>3</span>
                <span>4</span>
                <span>▢</span>
                <span>◇</span>
                <span>+</span>
                <span>Δ</span>
            </div>
        </div>

        <div class="botonera">
            <button class="boton btn-libre"></button>
            <button class="boton btn-ocupado"></button>
            <button class="boton btnt56"></button>
            <button class="boton"></button>
            <button class="boton btn-pausa"></button>
            <button class="boton btn-pagar"></button>
            <button class="boton"></button>
            <button class="boton"></button>
            <button class="boton"></button>
        </div>
    </div>








</main>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="../JavaScript/taximetro.js" ></script>
    <script src="../JavaScript/menuH.js"></script>
</body>
</html>
